name: Deploy Static Site To Debian VPS (Caddy)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /home/${{ secrets.VPS_USER }}/imgedit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production assets with docker compose
        run: |
          docker compose run --rm app sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm build"

      - name: Detect build output directory
        run: |
          if [ -d dist ]; then
            echo "BUILD_OUTPUT_DIR=dist" >> "$GITHUB_ENV"
          elif [ -d .output/public ]; then
            echo "BUILD_OUTPUT_DIR=.output/public" >> "$GITHUB_ENV"
          else
            echo "No supported build output directory found."
            echo "Expected one of: dist, .output/public"
            ls -la
            ls -la .output || true
            exit 1
          fi

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Trust VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Create release on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          RELEASE_ID="${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH/releases/$RELEASE_ID'"

      - name: Upload build output to VPS release directory
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar -C "$BUILD_OUTPUT_DIR" -cf - . | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" "tar -xf - -C '$DEPLOY_PATH/releases/$RELEASE_ID'"

      - name: Activate new release and prune old releases
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" "
            set -eu
            ln -sfn '$DEPLOY_PATH/releases/$RELEASE_ID' '$DEPLOY_PATH/current'
            ls -1dt '$DEPLOY_PATH'/releases/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          "
