name: CI

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-cd-master
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run typecheck and build in Docker Compose
        run: |
          docker compose run --rm app sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm run typecheck && pnpm run build"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: checks
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build gate in Docker Compose
        run: |
          docker compose run --rm app sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm run build"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
          TRIGGER_PROJECT_REF: ${{ secrets.TRIGGER_PROJECT_REF }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_SITE_URL: ${{ secrets.SUPABASE_SITE_URL }}
          SUPABASE_AUTH_EXTERNAL_URL: ${{ secrets.SUPABASE_AUTH_EXTERNAL_URL }}
          SUPABASE_AUTH_INTERNAL_URL: ${{ secrets.SUPABASE_AUTH_INTERNAL_URL }}
          SUPABASE_ADDITIONAL_REDIRECT_URLS: ${{ secrets.SUPABASE_ADDITIONAL_REDIRECT_URLS }}
          VITE_SUPABASE_AUTH_URL: ${{ secrets.VITE_SUPABASE_AUTH_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GITHUB_REPOSITORY,GITHUB_TOKEN,TRIGGER_SECRET_KEY,TRIGGER_PROJECT_REF,REPLICATE_API_TOKEN,R2_ACCOUNT_ID,R2_BUCKET,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_PUBLIC_BASE_URL,DATABASE_URL,DIRECT_URL,SUPABASE_JWT_SECRET,SUPABASE_SITE_URL,SUPABASE_AUTH_EXTERNAL_URL,SUPABASE_AUTH_INTERNAL_URL,SUPABASE_ADDITIONAL_REDIRECT_URLS,VITE_SUPABASE_AUTH_URL
          script_stop: true
          script: |
            APP_DIR="$HOME/imgedit"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

            mkdir -p "$APP_DIR"

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is empty on remote session"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cat > "$APP_DIR/.env.production" <<EOF
            TRIGGER_SECRET_KEY=$TRIGGER_SECRET_KEY
            TRIGGER_PROJECT_REF=$TRIGGER_PROJECT_REF
            REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN
            R2_ACCOUNT_ID=$R2_ACCOUNT_ID
            R2_BUCKET=$R2_BUCKET
            R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
            R2_PUBLIC_BASE_URL=$R2_PUBLIC_BASE_URL
            DATABASE_URL=$DATABASE_URL
            DIRECT_URL=$DIRECT_URL
            SUPABASE_JWT_SECRET=$SUPABASE_JWT_SECRET
            SUPABASE_SITE_URL=$SUPABASE_SITE_URL
            SUPABASE_AUTH_EXTERNAL_URL=$SUPABASE_AUTH_EXTERNAL_URL
            SUPABASE_AUTH_INTERNAL_URL=$SUPABASE_AUTH_INTERNAL_URL
            SUPABASE_ADDITIONAL_REDIRECT_URLS=$SUPABASE_ADDITIONAL_REDIRECT_URLS
            VITE_SUPABASE_AUTH_URL=$VITE_SUPABASE_AUTH_URL
            EOF

            cd "$APP_DIR"
            chmod +x deploy/deploy.sh
            APP_DIR="$APP_DIR" BRANCH=master REPO_URL="$REPO_URL" ./deploy/deploy.sh
