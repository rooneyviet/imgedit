services:
  app:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm exec vite dev --host 0.0.0.0 --port 3000"

volumes:
  node_modules:
