services:
  app:
    container_name: imgedit-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_AUTH_URL: ${VITE_SUPABASE_AUTH_URL:-}
    image: imgedit:latest
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3030:3030"
